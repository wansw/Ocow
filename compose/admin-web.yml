name: ocow

services:
  ocow-admin-web:
    build:
      context: ../src/Admin/Ocow.Admin.Web
      dockerfile: Dockerfile
    container_name: ocow-admin-web
    restart: unless-stopped
    environment:
      GATEWAY_BASE_URL: "${GATEWAY_BASE_URL:-http://ocow-gateway:8080}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${OCOW_ADMIN_WEB_PORT:-8088}:80"
    networks:
      - ocow-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  ocow-net:
    name: ocow-net
    driver: bridge
